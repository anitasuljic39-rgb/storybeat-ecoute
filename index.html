<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryBeat — Ta chanson</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap');
:root{
  --bg:#0b0a10;--bg2:#100e16;--card:#1c1926;--card-hi:#26212f;
  --pink:#ff3aa8;--violet:#9b4dff;--cyan:#1fd6ff;--white:#fff;
  --muted:rgba(255,255,255,.62);--line:rgba(255,255,255,.12);
  --grad3:linear-gradient(90deg,#ff3aa8 0%,#9b4dff 50%,#1fd6ff 100%);
  --display:'Sora',sans-serif;--body:'Manrope',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;
  background:radial-gradient(60% 40% at 50% 0%,rgba(155,77,255,.22),transparent 70%),radial-gradient(50% 30% at 80% 15%,rgba(31,214,255,.12),transparent 70%),var(--bg);
  padding:32px 20px 60px;}
.wrap{max-width:520px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px}
.logo{font-family:var(--display);font-weight:800;font-style:italic;font-size:20px;letter-spacing:.5px}
.logo .b{background:var(--grad3);-webkit-background-clip:text;background-clip:text;color:transparent}
.player-card{background:var(--card);background:linear-gradient(var(--card),var(--card)) padding-box,var(--grad3) border-box;border:1.5px solid transparent;border-radius:26px;padding:34px 28px;text-align:center;box-shadow:0 30px 80px -30px rgba(155,77,255,.55);}
.cover{width:132px;height:132px;border-radius:26px;margin:0 auto 22px;background:var(--grad3);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:52px;color:#fff;box-shadow:0 16px 40px -12px rgba(255,58,168,.5);position:relative;background-size:cover;background-position:center}
.cover .note{position:absolute;bottom:-8px;right:-8px;background:var(--bg2);border:1px solid var(--line);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.title{font-family:var(--display);font-weight:800;font-size:26px;line-height:1.15;margin-bottom:6px}
.for{color:var(--muted);font-size:15px;margin-bottom:24px}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:44px;margin:6px 0 18px}
.wave span{width:3px;border-radius:3px;background:linear-gradient(180deg,var(--pink),var(--violet));opacity:.5}
.wave.playing span{animation:bounce 1s ease-in-out infinite;opacity:1}
@keyframes bounce{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
.bar{height:5px;background:rgba(255,255,255,.14);border-radius:5px;overflow:hidden;margin-bottom:8px;cursor:pointer}
.bar .fill{height:100%;width:0%;background:var(--grad3);border-radius:5px}
.times{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:22px}
.play{width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;margin:0 auto;background:var(--grad3);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 34px -8px rgba(255,58,168,.6);transition:transform .15s}
.play:hover{transform:scale(1.06)}
video{width:100%;border-radius:18px;margin-top:8px;background:#000}
.dl-wrap{margin-top:24px}
.dl-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);background:var(--card-hi);color:var(--white);border-radius:14px;padding:13px 24px;font-family:var(--body);font-weight:600;font-size:15px;cursor:pointer;transition:border-color .2s,transform .1s}
.dl-btn:hover{border-color:var(--cyan);transform:translateY(-1px)}
.dl-btn:disabled{opacity:.6;cursor:default;transform:none}
.dl-fallback{display:block;margin-top:12px;font-size:13px;color:var(--muted);text-decoration:underline}
.dl-fallback:hover{color:var(--white)}
.upsell-btn{position:relative;overflow:hidden;isolation:isolate;display:inline-flex;align-items:center;justify-content:center;gap:9px;margin-top:18px;border:none;background:#ff2e88;color:#fff;text-shadow:0 0 8px rgba(255,255,255,.55);border-radius:16px;padding:17px 30px;font-family:var(--display);font-weight:800;font-size:16px;letter-spacing:.2px;cursor:pointer;box-shadow:0 14px 40px -10px rgba(255,46,136,.55);animation:upsellPulse 1.3s ease-in-out infinite;transition:transform .18s ease}
.upsell-btn::before{content:"";position:absolute;z-index:-1;top:-50%;left:0;width:55%;height:200%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.6),transparent);transform:skewX(-20deg) translateX(-250%);animation:upsellSweep 2.3s ease-in-out infinite;pointer-events:none}
.upsell-btn .upsell-ico{filter:drop-shadow(0 0 6px rgba(255,255,255,.5))}
.upsell-btn .upsell-txt{text-align:center}
.upsell-btn .upsell-em{font-size:1.14em;font-weight:800}
.upsell-btn:hover{transform:scale(1.04);box-shadow:0 20px 56px -6px rgba(255,46,136,.9)}
@keyframes upsellPulse{0%,100%{box-shadow:0 12px 34px -12px rgba(255,46,136,.5)}50%{box-shadow:0 20px 54px -6px rgba(255,46,136,.9)}}
@keyframes upsellSweep{0%{transform:skewX(-20deg) translateX(-250%)}45%,100%{transform:skewX(-20deg) translateX(420%)}}
@media (prefers-reduced-motion:reduce){.upsell-btn{animation:none;box-shadow:0 14px 44px -8px rgba(255,46,136,.75)}.upsell-btn::before{animation:none;display:none}}
@media (max-width:400px){.upsell-btn{font-size:14.5px;padding:15px 16px;gap:7px}}
.lyrics{margin-top:30px;text-align:left}
.lyrics h2{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;text-align:center}
.lyrics .part{margin-bottom:18px}
.lyrics .lab{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--pink);font-weight:700;margin-bottom:6px}
.lyrics p{color:rgba(255,255,255,.9);font-size:16px;line-height:1.7}
.share{margin-top:32px;text-align:center}
.share .lab2{font-family:var(--display);font-size:16px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:16px}
.share-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.sbtn{border:1px solid var(--line);background:var(--card-hi);color:var(--white);border-radius:14px;padding:13px 20px;font-family:var(--body);font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:border-color .2s,transform .1s}
.sbtn:hover{border-color:var(--pink);transform:translateY(-1px)}
.sbtn.wa{background:#25D366;border-color:#25D366;color:#0b0a10}
#qrbox{display:none;margin:20px auto 0;background:#fff;padding:16px;border-radius:16px;width:fit-content}
.foot{text-align:center;margin-top:40px;padding-top:26px;border-top:1px solid var(--line)}
.foot p{color:var(--muted);font-size:14px;margin-bottom:14px}
.cta{display:inline-block;background:linear-gradient(var(--bg),var(--bg)) padding-box,var(--grad3) border-box;border:1.5px solid transparent;color:#fff;text-decoration:none;font-family:var(--display);font-weight:700;font-size:15px;padding:13px 26px;border-radius:14px;transition:transform .15s ease}
.cta:hover{transform:translateY(-1px)}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--card-hi);border:1px solid var(--line);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;transition:.3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.state{text-align:center;padding:60px 20px;color:var(--muted)}
.state h1{font-family:var(--display);color:var(--white);font-size:22px;margin-bottom:10px}

.lyric-hero{position:relative;width:100%;aspect-ratio:1/1;max-height:360px;border-radius:22px;overflow:hidden;margin-bottom:22px;
  background:radial-gradient(70% 55% at 50% 32%,rgba(155,77,255,.30),transparent 72%),linear-gradient(160deg,#171322,#0b0a10);
  border:1px solid rgba(255,255,255,.10);box-shadow:0 24px 60px -26px rgba(155,77,255,.55)}
.lyric-hero::before,.lyric-hero::after{content:"";position:absolute;left:0;right:0;height:70px;z-index:2;pointer-events:none}
.lyric-hero::before{top:0;background:linear-gradient(#0b0a10,transparent)}
.lyric-hero::after{bottom:0;background:linear-gradient(transparent,#0b0a10)}
.lyric-hero .scroll{position:absolute;left:0;right:0;top:0;padding:44% 24px 60% 24px;text-align:center;transition:transform .4s ease}
.lyric-hero .kl{font-family:'Sora',sans-serif;font-weight:600;font-size:19px;line-height:1.5;margin:14px 0;color:rgba(255,255,255,.30);transition:color .3s,opacity .3s,transform .3s}
.lyric-hero .kl.on{color:#fff;text-shadow:0 0 18px rgba(255,58,168,.45);transform:scale(1.04)}
.lyric-hero.freeflow{overflow-y:auto}
.lyric-hero.freeflow .scroll{position:relative;padding:34px 24px;transition:none}
.lyric-hero.freeflow .kl{color:rgba(255,255,255,.9)}
.lyric-hero.freeflow .kl.lab{color:#ff3aa8;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:22px}
.video-hero{width:100%;border-radius:18px;margin-bottom:22px;background:#000}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="state"><h1>Chargement…</h1><p>Un instant, on prépare ta chanson 🎵</p></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const app=document.getElementById('app');
const params=new URLSearchParams(location.search);
const id=params.get('id');
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1900);}
function fmt(s){if(!s||isNaN(s))return '0:00';const m=Math.floor(s/60);const ss=String(Math.floor(s%60)).padStart(2,'0');return m+':'+ss;}
function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showError(msg){
  app.innerHTML='<div class="state"><h1>Oups…</h1><p>'+msg+'</p><p style="margin-top:18px"><a class="cta" href="https://www.storybeat.fr">Découvrir StoryBeat</a></p></div>';
}
if(!id){ showError("Aucune chanson n'est indiquée dans le lien."); }
else{
  fetch('../chansons/'+encodeURIComponent(id)+'.json?t='+Date.now())
    .then(r=>{ if(!r.ok) throw new Error('not found'); return r.json(); })
    .then(render)
    .catch(()=>showError("On ne trouve pas cette chanson. Vérifie le lien."));
}
function render(d){
  const isVideo=(d.type==='video');
  const hasKar=!isVideo && Array.isArray(d.karaoke) && d.karaoke.length>0;
  let hero='';
  if(isVideo){
    hero=`<video class="video-hero" src="${d.media}" controls playsinline></video>`;
  }else if(hasKar){
    const lines=d.karaoke.map((k,i)=>`<div class="kl" data-i="${i}">${esc(k.l)}</div>`).join('');
    hero=`<div class="lyric-hero" id="lhero"><div class="scroll" id="lscroll">${lines}</div></div>`;
  }else{
    const lines=(d.paroles||[]).map(p=>`${p.label?`<div class="kl lab">${esc(p.label)}</div>`:''}<div class="kl">${esc(p.texte).replace(/\n/g,'<br>')}</div>`).join('');
    hero=`<div class="lyric-hero freeflow"><div class="scroll">${lines||'<div class="kl">\u266a</div>'}</div></div>`;
  }
  let controls='';
  if(!isVideo){
    controls=`
      <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
      <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
      <button class="play" id="play" aria-label="Lecture">\u25b6</button>
      <audio id="audio" src="${d.media}" preload="metadata"></audio>`;
  }
  const dlLabel=isVideo?'\u2b07\ufe0f T\u00e9l\u00e9charger ma vid\u00e9o':'\u2b07\ufe0f T\u00e9l\u00e9charger ma chanson';
  app.innerHTML=`
    <div class="top">
      <div class="logo">STORY<span class="b">BEAT</span></div>
    </div>
    <div class="player-card">
      ${hero}
      <div class="eyebrow">Une chanson rien que pour toi</div>
      <div class="title">${esc(d.titre)}</div>
      <div class="for">${esc(d.pour||'')}</div>
      ${controls}
      <div class="dl-wrap">
        <button class="dl-btn" id="dlbtn">${dlLabel}</button>
        <a class="dl-fallback" id="dlfallback" href="${d.media}" target="_blank" rel="noopener" style="display:none">Ouvrir le fichier \u2197</a>
        <div><button class="upsell-btn" id="upsellbtn" style="display:none"><span class="upsell-ico">\ud83c\udfb5</span><span class="upsell-txt">Obtenir l'autre version pour <span class="upsell-em">seulement</span> <span style="white-space:nowrap">9,90&nbsp;\u20ac</span></span></button></div>
      </div>
    </div>
    <div class="share">
      <div class="lab2">Partage cette chanson</div>
      <div class="share-row">
        <button class="sbtn wa" onclick="shareWa()">\ud83d\udcac WhatsApp</button>
        <button class="sbtn" onclick="copyLink()">\ud83d\udd17 Copier le lien</button>
        <button class="sbtn" onclick="toggleQR()">\u25a6 QR code</button>
      </div>
      <div id="qrbox"></div>
    </div>
    <div class="foot">
      <p>Cette chanson a \u00e9t\u00e9 cr\u00e9\u00e9e sur-mesure avec StoryBeat.</p>
      <a class="cta" href="https://www.storybeat.fr">\ud83c\udfb5 Cr\u00e9e la tienne</a>
    </div>`;
  if(!isVideo) setupAudio(hasKar?d.karaoke:null);
  setupDownload(d);
  setupUpsell();
}

const STRIPE_LINK='https://buy.stripe.com/14AfZh7G63bi3ZB8QG7bW00';
function invertId(rawId){
  if(!rawId) return null;
  if(/-a$/i.test(rawId)) return rawId.replace(/-a$/i,'-b');
  if(/-b$/i.test(rawId)) return rawId.replace(/-b$/i,'-a');
  return null;
}
function setupUpsell(){
  const btn=document.getElementById('upsellbtn');
  if(!btn) return;
  if(params.get('acquis')==='1') return; // l'autre version vient d'être achetée : pas d'upsell
  const other=invertId(id);
  if(!other) return; // id sans suffixe -a/-b : formule à une seule version, pas d'upsell
  // On ne propose l'autre version que si elle existe vraiment.
  fetch('../chansons/'+encodeURIComponent(other)+'.json?t='+Date.now())
    .then(r=>{
      if(!r.ok) return; // 404 : pas de deuxième version, on n'affiche pas le bouton
      btn.style.display='inline-flex';
      btn.onclick=()=>{
        // On mémorise la version DÉJÀ possédée le temps de l'aller-retour Stripe
        // (le lien Stripe est fixe et ne transporte pas l'id).
        try{ localStorage.setItem('storybeat_upsell_id', id); }catch(e){}
        location.href=STRIPE_LINK;
      };
    })
    .catch(()=>{}); // réseau : on reste silencieux, pas de bouton
}
function fileExt(url){
  try{ const m=new URL(url,location.href).pathname.match(/\.([a-z0-9]{2,4})$/i); return m?m[1].toLowerCase():'mp3'; }
  catch(e){ return 'mp3'; }
}
function setupDownload(d){
  const btn=document.getElementById('dlbtn');
  const fb=document.getElementById('dlfallback');
  if(!btn||!d.media){ if(btn) btn.style.display='none'; return; }
  const filename='StoryBeat - ma chanson.'+fileExt(d.media);
  btn.onclick=async()=>{
    const orig=btn.textContent;
    btn.disabled=true; btn.textContent='⏳ Téléchargement…';
    try{
      // Le fichier est sur Bunny (b-cdn.net) : on le récupère en cross-origin
      // puis on force un vrai téléchargement via un blob local.
      const res=await fetch(d.media,{mode:'cors'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),4000);
      btn.textContent='✅ Téléchargée !';
      setTimeout(()=>{ btn.textContent=orig; btn.disabled=false; },2500);
    }catch(e){
      // Secours si le téléchargement direct échoue (CORS, réseau…)
      btn.textContent=orig; btn.disabled=false;
      if(fb) fb.style.display='block';
      toast('Téléchargement direct indisponible — utilise « Ouvrir le fichier ».');
    }
  };
}
function setupAudio(karaoke){
  const audio=document.getElementById('audio');
  const play=document.getElementById('play');
  const fill=document.getElementById('fill');
  const bar=document.getElementById('bar');
  const cur=document.getElementById('cur');
  const dur=document.getElementById('dur');
  const scroll=document.getElementById('lscroll');
  const hero=document.getElementById('lhero');
  const lines=scroll?[...scroll.querySelectorAll('.kl')]:[];
  let activeIdx=-1;
  function syncKaraoke(){
    if(!karaoke||!hero) return;
    const t=audio.currentTime;
    let idx=-1;
    for(let i=0;i<karaoke.length;i++){ if(karaoke[i].t<=t+0.15) idx=i; else break; }
    if(idx===activeIdx) return;
    activeIdx=idx;
    lines.forEach((el,i)=>el.classList.toggle('on',i===idx));
    if(idx>=0 && lines[idx]){
      const el=lines[idx];
      const target=Math.max(0, el.offsetTop - hero.clientHeight/2 + el.clientHeight/2);
      scroll.style.transform='translateY(-'+target+'px)';
    }
  }
  audio.addEventListener('loadedmetadata',()=>{dur.textContent=fmt(audio.duration);});
  audio.addEventListener('timeupdate',()=>{fill.style.width=(audio.currentTime/audio.duration*100||0)+'%';cur.textContent=fmt(audio.currentTime);syncKaraoke();});
  audio.addEventListener('ended',()=>{play.textContent='\u25b6';});
  play.onclick=()=>{ if(audio.paused){audio.play();play.textContent='\u275a\u275a';} else {audio.pause();play.textContent='\u25b6';} };
  bar.onclick=(e)=>{const rect=bar.getBoundingClientRect();audio.currentTime=(e.clientX-rect.left)/rect.width*audio.duration;syncKaraoke();};
}

function copyLink(){const u=location.href;if(navigator.clipboard){navigator.clipboard.writeText(u).then(()=>toast('Lien copié ! ✨')).catch(()=>toast(u));}else toast(u);}
function shareWa(){const u=encodeURIComponent(location.href);window.open('https://wa.me/?text='+u,'_blank');}
function toggleQR(){
  const box=document.getElementById('qrbox');
  if(box.style.display==='block'){box.style.display='none';return;}
  if(!box.hasChildNodes()){ new QRCode(box,{text:location.href,width:180,height:180}); }
  box.style.display='block';
}
</script>
</body>
</html>
