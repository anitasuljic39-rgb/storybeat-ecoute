<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryBeat — Valide ton extrait</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap');
:root{--bg:#0b0a10;--card:#1c1926;--card2:#26212f;--pink:#ff3aa8;--violet:#9b4dff;--cyan:#1fd6ff;--white:#fff;--muted:rgba(255,255,255,.62);--line:rgba(255,255,255,.14);--grad3:linear-gradient(90deg,#ff3aa8,#9b4dff,#1fd6ff);--display:'Sora',sans-serif;--body:'Manrope',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:var(--body);min-height:100vh;padding:34px 20px 60px;background:radial-gradient(60% 40% at 50% 0%,rgba(155,77,255,.22),transparent 70%),var(--bg)}
.wrap{max-width:520px;margin:0 auto}
.logo{font-family:var(--display);font-weight:800;font-style:italic;font-size:20px;text-align:center;margin-bottom:26px}
.logo .b{background:var(--grad3);-webkit-background-clip:text;background-clip:text;color:transparent}
.eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:8px}
h1{font-family:var(--display);font-weight:800;font-size:25px;text-align:center;line-height:1.2;margin-bottom:10px}
.intro{color:var(--muted);text-align:center;font-size:15px;margin-bottom:30px}
.vcard{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:22px 20px;margin-bottom:18px}
.vcard.two{background:linear-gradient(var(--card),var(--card)) padding-box,var(--grad3) border-box;border:1.5px solid transparent}
.vlabel{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:14px;text-align:center}
audio{width:100%;margin-bottom:16px}
.btn-val{width:100%;border:none;cursor:pointer;font-family:var(--display);font-weight:700;font-size:16px;color:#fff;border-radius:14px;padding:15px;background:var(--grad3);box-shadow:0 12px 30px -10px rgba(155,77,255,.6);transition:transform .12s,opacity .2s}
.btn-val:hover{transform:translateY(-1px)}
.btn-val:disabled{opacity:.45;cursor:not-allowed;transform:none}
.done{display:none;text-align:center;background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:6px}
.done.show{display:block}
.done h2{font-family:var(--display);font-size:20px;margin-bottom:8px}
.done p{color:var(--muted);font-size:15px}
.state{text-align:center;padding:60px 20px;color:var(--muted)}
.state h1{font-family:var(--display);color:var(--white);font-size:22px;margin-bottom:10px}
.mini{color:var(--muted);font-size:12px;text-align:center;margin-top:8px}
.warnbox{background:rgba(255,180,58,.08);border:1px solid rgba(255,180,58,.45);color:#ffd7a0;border-radius:14px;padding:13px 16px;font-size:14px;line-height:1.5;text-align:center;margin-bottom:26px}
.warnbox b{color:#ffb43a}
.softnote{color:var(--muted);text-align:center;font-size:12.5px;line-height:1.5;margin:16px 0 6px;opacity:.85}
.refund{text-align:center;margin:2px 0 24px}
.refund-link{background:none;border:none;color:var(--muted);font-family:var(--body);font-size:13px;text-decoration:underline;cursor:pointer;padding:6px 8px}
.refund-link:hover{color:var(--white)}
.refund-link:disabled{opacity:.5;cursor:default;text-decoration:none}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 22px;max-width:420px;width:100%;text-align:center;box-shadow:0 30px 80px -30px rgba(0,0,0,.7)}
.modal-txt{font-size:15px;line-height:1.55;margin-bottom:18px;color:var(--white)}
.modal .btn-val{margin-bottom:10px}
.modal-cancel{width:100%;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:var(--body);font-weight:600;font-size:14px;border-radius:12px;padding:12px;cursor:pointer;transition:color .2s}
.modal-cancel:hover{color:var(--white)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser/dist/email.min.js"></script>
</head>
<body>
<div class="wrap" id="app"><div class="state"><h1>Chargement…</h1><p>On prépare ton extrait 🎵</p></div></div>
<script>
const PUBLIC_KEY='u6MuSGT1tR3q8I1pb';
const SERVICE_ID='service_ehijilk';
const TEMPLATE_ID='template_hrisr2w';
if(window.emailjs) emailjs.init({publicKey:PUBLIC_KEY});
const app=document.getElementById('app');
const id=new URLSearchParams(location.search).get('id');
function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Prénom propre : repli "Cliente" si vide, 1re lettre en majuscule (clara → Clara).
function cleanPrenom(p){ p=String(p==null?'':p).trim(); if(!p) return 'Cliente'; return p.charAt(0).toUpperCase()+p.slice(1); }
function showError(m){app.innerHTML='<div class="state"><h1>Oups…</h1><p>'+m+'</p></div>';}
function confirmDialog(opts){
  const ov=document.createElement('div');ov.className='modal-ov';
  ov.innerHTML='<div class="modal"><p class="modal-txt">'+opts.text+'</p>'
    +'<button class="btn-val modal-ok">'+opts.okLabel+'</button>'
    +'<button class="modal-cancel">'+(opts.cancelLabel||'Annuler')+'</button></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('.modal-ok').onclick=()=>{close();if(opts.onOk)opts.onOk();};
  ov.querySelector('.modal-cancel').onclick=close;
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
}
if(!id){ showError("Aucun extrait n'est indiqué dans le lien."); }
else{
  fetch('../extraits/'+encodeURIComponent(id)+'.json?t='+Date.now())
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(render)
    .catch(()=>showError("On ne trouve pas cet extrait. Vérifie le lien."));
}
function render(d){
  const two=(d.versions||[]).length>1;
  const cards=(d.versions||[]).map((v,idx)=>{
    const btnLabel = two ? ('🎧 Je choisis la '+esc(v.label)) : '✅ Je valide et je reçois ma chanson';
    return `<div class="vcard ${two?'two':''}">
      ${two?`<div class="vlabel">${esc(v.label)}</div>`:''}
      <audio controls preload="metadata" src="${v.media}"></audio>
      <button class="btn-val" data-idx="${idx}">${btnLabel}</button>
    </div>`;
  }).join('');
  app.innerHTML=`
    <div class="logo">STORY<span class="b">BEAT</span></div>
    <div class="eyebrow">Ton extrait à valider</div>
    <h1>${two?'Choisis ta version préférée':'Voici ton extrait, '+esc(d.prenom)+' 🎵'}</h1>
    <div class="intro">${two?'Écoute les deux versions et choisis celle que tu préfères. Tu reçois aussitôt ta chanson complète.':'Écoute ton extrait. Il te plaît ? Valide, et tu reçois ta chanson complète tout de suite.'}</div>
    ${cards}
    <div class="softnote">En validant, tu reçois ta chanson complète tout de suite. Ton choix est alors définitif.</div>
    <div class="refund"><button type="button" class="refund-link" id="refund-link">Aucune des deux ne me convient ? Je demande mon remboursement</button></div>
    <div class="mini">Une question ? Écris-nous à contact@storybeat.fr</div>
    <div class="done" id="done"><h2>✅ Merci ${esc(d.prenom)} !</h2><p>On te redirige vers ta chanson…</p></div>
    <div class="done" id="refundDone"><h2>✅ C'est noté</h2><p>Comme promis, tu seras remboursée — nous revenons vers toi très vite par e-mail.</p></div>
    <div class="done" id="sendFail"></div>`;
  // Affiche un état d'échec bien visible (ne jamais masquer une erreur d'envoi).
  function showFail(html){ const f=document.getElementById('sendFail'); f.innerHTML=html; f.classList.add('show'); f.scrollIntoView({behavior:'smooth'}); }
  function reenableButtons(){ app.querySelectorAll('.btn-val').forEach(x=>x.disabled=false); const rl=document.getElementById('refund-link'); if(rl){ rl.disabled=false; rl.style.display=''; } }
  // Nombre de versions → dérive le libellé A/B (1re = A, 2e = B) ou "unique" s'il n'y en a qu'une.
  const nbVersions=(d.versions||[]).length;

  // Validation A/B : notification EmailJS (titre + message) puis redirection UNIQUEMENT si l'envoi a réussi.
  function doValidate(v, idx){
    app.querySelectorAll('.btn-val').forEach(x=>x.disabled=true);
    const rl=document.getElementById('refund-link'); if(rl) rl.disabled=true;
    const prenom=cleanPrenom(d.prenom);
    const ab = nbVersions>1 ? String.fromCharCode(65+idx) : 'unique'; // 0→A, 1→B
    const titre = (ab==='unique') ? ('✅ '+prenom+' a validé son extrait')
                                  : ('✅ '+prenom+' a validé la version '+ab);
    const message = prenom+' a validé son extrait. Version choisie : '+ab+'.';
    const params={ titre:titre, message:message };
    const go=()=>{ location.href=v.final; };
    const ok=()=>{
      const dn=document.getElementById('done'); dn.classList.add('show'); dn.scrollIntoView({behavior:'smooth'});
      setTimeout(go,1200);
    };
    const fail=()=>{
      reenableButtons();
      showFail('<h2>⚠️ Un souci est survenu</h2><p>La confirmation n\'a pas pu être envoyée. Réessaie dans un instant, ou écris-nous à contact@storybeat.fr.<br><a href="'+esc(v.final)+'">Accéder quand même à ta chanson »</a></p>');
    };
    if(window.emailjs){
      emailjs.send(SERVICE_ID,TEMPLATE_ID,params).then(ok).catch(fail);
    } else { fail(); }
  }
  app.querySelectorAll('.btn-val').forEach(b=>{
    b.onclick=()=>{
      const idx=+b.dataset.idx;
      const v=d.versions[idx];
      confirmDialog({
        text:'En confirmant, tu reçois ta chanson complète, cet achat devient définitif (plus de remboursement possible).',
        okLabel:'Oui, je confirme mon choix',
        onOk:()=>doValidate(v, idx)
      });
    };
  });
  // Demande de remboursement : notification EmailJS (titre + message + id), PAS de redirection.
  // On n'affiche "C'est noté" QUE si l'envoi a réussi (sinon la demande serait perdue sans que personne ne le sache).
  function doRefund(){
    app.querySelectorAll('.btn-val').forEach(x=>x.disabled=true);
    const rl=document.getElementById('refund-link'); if(rl){rl.disabled=true;rl.style.display='none';}
    const prenom=cleanPrenom(d.prenom);
    const titre = '⚠️ REMBOURSEMENT demandé — '+prenom;
    const message = '⚠️ '+prenom+' demande un REMBOURSEMENT pour son extrait (id : '+id+'). À traiter rapidement.';
    const rparams={ titre:titre, message:message, id:id };
    const ok=()=>{ const rd=document.getElementById('refundDone'); rd.classList.add('show'); rd.scrollIntoView({behavior:'smooth'}); };
    const fail=()=>{
      if(rl){ rl.disabled=false; rl.style.display=''; } // ré-affiche le lien pour réessayer
      showFail('<h2>⚠️ Envoi impossible</h2><p>Ta demande de remboursement n\'a pas pu être envoyée. Réessaie, ou écris-nous directement à contact@storybeat.fr pour qu\'on la traite.</p>');
    };
    if(window.emailjs){
      emailjs.send(SERVICE_ID,TEMPLATE_ID,rparams).then(ok).catch(fail);
    } else { fail(); }
  }
  const refundBtn=document.getElementById('refund-link');
  if(refundBtn) refundBtn.onclick=()=>{
    confirmDialog({
      text:'Es-tu sûre ? Ta chanson ne sera pas validée et nous te rembourserons.',
      okLabel:'Oui, demander le remboursement',
      onOk:doRefund
    });
  };
}
</script>
</body>
</html>
